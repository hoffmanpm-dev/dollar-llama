<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="Arial, Helvetica, sans-serif">
  <rect width="760" height="380" fill="#FAF8F3"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016" letter-spacing="2.5">S&amp;P 500 ANNUALIZED RETURNS BY HOLDING PERIOD</text>
  <text x="380" y="52" text-anchor="middle" font-size="11" fill="#999999">Range of annualized total returns across rolling holding periods, 1928 to today</text>
  <line x1="200" y1="62" x2="560" y2="62" stroke="#E0DDD5" stroke-width="0.8"/>

  <!-- Long-term average label -->
  <text x="444" y="92" text-anchor="middle" font-size="10" fill="#2D5016" letter-spacing="1.5" font-weight="bold">LONG-TERM AVG ~10%</text>

  <!-- Vertical gridlines (light) -->
  <line x1="157" y1="100" x2="157" y2="295" stroke="#E0DDD5" stroke-width="0.5"/>
  <line x1="272" y1="100" x2="272" y2="295" stroke="#E0DDD5" stroke-width="0.5"/>
  <line x1="501" y1="100" x2="501" y2="295" stroke="#E0DDD5" stroke-width="0.5"/>
  <line x1="616" y1="100" x2="616" y2="295" stroke="#E0DDD5" stroke-width="0.5"/>
  <line x1="730" y1="100" x2="730" y2="295" stroke="#E0DDD5" stroke-width="0.5"/>

  <!-- 0% reference line (emphasized) -->
  <line x1="386.5" y1="100" x2="386.5" y2="295" stroke="#999999" stroke-width="1.2"/>

  <!-- Long-term average reference line (dashed) -->
  <line x1="444" y1="100" x2="444" y2="295" stroke="#2D5016" stroke-width="1" stroke-dasharray="4,3" opacity="0.55"/>

  <!-- Y-axis labels -->
  <text x="90" y="124" text-anchor="end" font-size="11" font-weight="bold" fill="#333333" letter-spacing="0.5">1 YEAR</text>
  <text x="90" y="174" text-anchor="end" font-size="11" font-weight="bold" fill="#333333" letter-spacing="0.5">5 YEARS</text>
  <text x="90" y="224" text-anchor="end" font-size="11" font-weight="bold" fill="#333333" letter-spacing="0.5">10 YEARS</text>
  <text x="90" y="274" text-anchor="end" font-size="11" font-weight="bold" fill="#333333" letter-spacing="0.5">30 YEARS</text>

  <!-- 1 year bar: -43 to +54 -->
  <rect x="140" y="108" width="556" height="24" fill="#2D5016" rx="2"/>
  <text x="135" y="124" text-anchor="end" font-size="11" fill="#333333">-43%</text>
  <text x="701" y="124" text-anchor="start" font-size="11" fill="#333333">+54%</text>

  <!-- 5 year bar: -12 to +29 -->
  <rect x="318" y="158" width="235" height="24" fill="#2D5016" rx="2"/>
  <text x="313" y="174" text-anchor="end" font-size="11" fill="#333333">-12%</text>
  <text x="558" y="174" text-anchor="start" font-size="11" fill="#333333">+29%</text>

  <!-- 10 year bar: -1 to +20 -->
  <rect x="381" y="208" width="120" height="24" fill="#2D5016" rx="2"/>
  <text x="376" y="224" text-anchor="end" font-size="11" fill="#333333">-1%</text>
  <text x="506" y="224" text-anchor="start" font-size="11" fill="#333333">+20%</text>

  <!-- 30 year bar: +8 to +13 -->
  <rect x="432" y="258" width="29" height="24" fill="#2D5016" rx="2"/>
  <text x="427" y="274" text-anchor="end" font-size="11" fill="#333333">+8%</text>
  <text x="466" y="274" text-anchor="start" font-size="11" fill="#333333">+13%</text>

  <!-- X-axis labels -->
  <text x="157" y="312" text-anchor="middle" font-size="10" fill="#999999">-40%</text>
  <text x="272" y="312" text-anchor="middle" font-size="10" fill="#999999">-20%</text>
  <text x="386.5" y="312" text-anchor="middle" font-size="10" fill="#999999" font-weight="bold">0%</text>
  <text x="501" y="312" text-anchor="middle" font-size="10" fill="#999999">+20%</text>
  <text x="616" y="312" text-anchor="middle" font-size="10" fill="#999999">+40%</text>
  <text x="730" y="312" text-anchor="middle" font-size="10" fill="#999999">+60%</text>

  <!-- Bottom border -->
  <line x1="100" y1="328" x2="730" y2="328" stroke="#E0DDD5" stroke-width="0.8"/>
  <text x="380" y="354" text-anchor="middle" font-size="10" fill="#999999" font-style="italic">Approximate annualized total returns including dividends. The longer you hold, the narrower the range.</text>
</svg>
