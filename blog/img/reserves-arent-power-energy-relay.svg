<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 388" font-family="Arial, Helvetica, sans-serif">
  <rect width="760" height="388" fill="#FAF8F3"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016" letter-spacing="2.5">THE ENERGY RELAY</text>
  <text x="380" y="50" text-anchor="middle" font-size="11" fill="#999999">Every dominant fuel was displaced by something its incumbents weren't watching</text>
  <line x1="240" y1="60" x2="520" y2="60" stroke="#E0DDD5" stroke-width="0.8"/>

  <!-- ===== CARD 1: WHALE OIL ===== -->
  <rect x="20" y="78" width="157" height="126" rx="8" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <path d="M28 78 H169 A8 8 0 0 1 177 86 V108 H20 V86 A8 8 0 0 1 28 78 Z" fill="#2D5016"/>
  <text x="98.5" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF" letter-spacing="1">EARLY 1800s</text>
  <text x="98.5" y="139" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D5016">Whale Oil</text>
  <text x="98.5" y="162" text-anchor="middle" font-size="9.5" fill="#333333">Premium fuel for</text>
  <text x="98.5" y="176" text-anchor="middle" font-size="9.5" fill="#333333">the household lamp</text>

  <!-- ===== CARD 2: COAL ===== -->
  <rect x="207" y="78" width="157" height="126" rx="8" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <path d="M215 78 H356 A8 8 0 0 1 364 86 V108 H207 V86 A8 8 0 0 1 215 78 Z" fill="#2D5016"/>
  <text x="285.5" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF" letter-spacing="1">MID-LATE 1800s</text>
  <text x="285.5" y="139" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D5016">Coal</text>
  <text x="285.5" y="162" text-anchor="middle" font-size="9.5" fill="#333333">Coal-oil, gas, and</text>
  <text x="285.5" y="176" text-anchor="middle" font-size="9.5" fill="#333333">steam power</text>

  <!-- ===== CARD 3: PETROLEUM ===== -->
  <rect x="394" y="78" width="157" height="126" rx="8" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <path d="M402 78 H543 A8 8 0 0 1 551 86 V108 H394 V86 A8 8 0 0 1 402 78 Z" fill="#2D5016"/>
  <text x="472.5" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF" letter-spacing="1">LATE 1800s-1900s</text>
  <text x="472.5" y="139" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D5016">Petroleum</text>
  <text x="472.5" y="162" text-anchor="middle" font-size="9.5" fill="#333333">Cheaper kerosene</text>
  <text x="472.5" y="176" text-anchor="middle" font-size="9.5" fill="#333333">for the lamp</text>

  <!-- ===== CARD 4: ELECTRICITY ===== -->
  <rect x="581" y="78" width="157" height="126" rx="8" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <path d="M589 78 H730 A8 8 0 0 1 738 86 V108 H581 V86 A8 8 0 0 1 589 78 Z" fill="#2D5016"/>
  <text x="659.5" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF" letter-spacing="1">1900s ONWARD</text>
  <text x="659.5" y="139" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D5016">Electricity</text>
  <text x="659.5" y="162" text-anchor="middle" font-size="9.5" fill="#333333">The electric light</text>
  <text x="659.5" y="176" text-anchor="middle" font-size="9.5" fill="#333333">takes the room</text>

  <!-- Arrows between cards -->
  <polygon points="186,134 200,141 186,148" fill="#2D5016"/>
  <polygon points="373,134 387,141 373,148" fill="#2D5016"/>
  <polygon points="560,134 574,141 560,148" fill="#2D5016"/>

  <!-- Dotted connectors to callouts -->
  <line x1="192" y1="208" x2="192" y2="229" stroke="#999999" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="379" y1="208" x2="379" y2="229" stroke="#999999" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="566" y1="208" x2="566" y2="229" stroke="#999999" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- ===== HANDOFF CALLOUTS ===== -->
  <rect x="105" y="231" width="174" height="55" rx="6" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <text x="192" y="249" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#2D5016" letter-spacing="1.5">THE HANDOFF</text>
  <text x="192" y="264" text-anchor="middle" font-size="9" fill="#333333">Whales hunted to scarcity.</text>
  <text x="192" y="277" text-anchor="middle" font-size="9" fill="#333333">Coal-oil and gas came cheaper.</text>

  <rect x="292" y="231" width="174" height="55" rx="6" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <text x="379" y="249" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#2D5016" letter-spacing="1.5">THE HANDOFF</text>
  <text x="379" y="264" text-anchor="middle" font-size="9" fill="#333333">1859: oil struck in Pennsylvania.</text>
  <text x="379" y="277" text-anchor="middle" font-size="9" fill="#333333">Petroleum kerosene, cheaper still.</text>

  <rect x="479" y="231" width="174" height="55" rx="6" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <text x="566" y="249" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#2D5016" letter-spacing="1.5">THE HANDOFF</text>
  <text x="566" y="264" text-anchor="middle" font-size="9" fill="#333333">Edison's electric light arrived</text>
  <text x="566" y="277" text-anchor="middle" font-size="9" fill="#333333">and took over the lamp.</text>

  <!-- ===== THE TWIST ===== -->
  <rect x="70" y="302" width="620" height="52" rx="8" fill="#2D5016"/>
  <text x="380" y="320" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF" letter-spacing="2.5">THE TWIST</text>
  <text x="380" y="335" text-anchor="middle" font-size="10.5" fill="#FFFFFF">Oil lost lighting to the electric bulb. Then the automobile, which nobody in the</text>
  <text x="380" y="349" text-anchor="middle" font-size="10.5" fill="#FFFFFF">kerosene business had planned for, turned a lamp fuel into the fuel of the modern age.</text>

  <!-- Footnote -->
  <line x1="120" y1="368" x2="640" y2="368" stroke="#E0DDD5" stroke-width="0.8"/>
  <text x="380" y="381" text-anchor="middle" font-size="9" fill="#999999" font-style="italic">Simplified for clarity. The fuels overlapped for decades, and coal and oil still power much of the world today.</text>
</svg>
