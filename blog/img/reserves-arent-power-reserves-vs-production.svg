  <text x="196" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF" letter-spacing="1">PROVEN RESERVES</text>
  <text x="196" y="134" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">BILLION BARRELS IN THE GROUND</text>
  <line x1="128" y1="146" x2="128" y2="442" stroke="#E0DDD5" stroke-width="1"/>

