<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 490" font-family="Arial, Helvetica, sans-serif">
  <rect width="760" height="490" fill="#FAF8F3"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016" letter-spacing="2.5">WHO HAS THE OIL VS. WHO PUMPS IT</text>
  <text x="380" y="54" text-anchor="middle" font-size="11" fill="#999999">The countries sitting on the most oil are mostly not the ones producing it</text>
  <line x1="230" y1="64" x2="530" y2="64" stroke="#E0DDD5" stroke-width="0.8"/>

  <!-- ===== LEFT CARD: PROVEN RESERVES ===== -->
