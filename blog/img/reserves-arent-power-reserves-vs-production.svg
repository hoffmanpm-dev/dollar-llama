  <!-- Footnote -->
  <line x1="100" y1="476" x2="660" y2="476" stroke="#E0DDD5" stroke-width="0.8"/>
  <text x="380" y="486" text-anchor="middle" font-size="10" fill="#999999" font-style="italic">Proven reserves and 2025 crude production. US reserves estimates vary widely by source and definition.</text>
