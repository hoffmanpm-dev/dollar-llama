<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, Helvetica, sans-serif; background: #FAF8F3;">
  <defs>
    <pattern id="coinLines" width="70" height="7" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6.5" x2="70" y2="6.5" stroke="#FAF8F3" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="760" height="340" fill="#FAF8F3"/>

  <text x="380" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016" letter-spacing="2.5">THE NICKEL STACK: $500 A MONTH AT 7%</text>

  <!-- Legend -->
  <rect x="255" y="46" width="12" height="12" rx="2" fill="#C9C5BA"/>
  <text x="272" y="56" font-size="11" fill="#333333">What you put in</text>
  <rect x="390" y="46" width="12" height="12" rx="2" fill="#2D5016"/>
  <text x="407" y="56" font-size="11" fill="#333333">What compounding added</text>

  <!-- Baseline -->
  <line x1="40" y1="280" x2="720" y2="280" stroke="#E0DDD5" stroke-width="1.5"/>

  <!-- START: single nickel -->
  <rect x="75" y="273" width="70" height="7" rx="3" fill="#C9C5BA"/>
  <text x="110" y="266" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016">$0</text>
  <text x="110" y="300" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">START</text>
  <text x="110" y="315" text-anchor="middle" font-size="10" fill="#999999">one nickel at a time</text>

  <!-- YEAR 10: total 86,542 -> 12px (contrib 8px, growth 4px) -->
  <rect x="215" y="272" width="70" height="8" fill="#C9C5BA"/>
  <rect x="215" y="268" width="70" height="4" rx="2" fill="#2D5016"/>
  <rect x="215" y="268" width="70" height="12" fill="url(#coinLines)"/>
  <text x="250" y="261" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016">$86,500</text>
  <text x="250" y="300" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">YEAR 10</text>
  <text x="250" y="315" text-anchor="middle" font-size="10" fill="#999999">$60,000 saved</text>

  <!-- YEAR 20: total 260,463 -> 35px (contrib 16px, growth 19px) -->
  <rect x="355" y="264" width="70" height="16" fill="#C9C5BA"/>
  <rect x="355" y="245" width="70" height="19" rx="2" fill="#2D5016"/>
  <rect x="355" y="245" width="70" height="35" fill="url(#coinLines)"/>
  <text x="390" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016">$260,500</text>
  <text x="390" y="300" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">YEAR 20</text>
  <text x="390" y="315" text-anchor="middle" font-size="10" fill="#999999">$120,000 saved</text>

  <!-- YEAR 30: total 609,985 -> 81px (contrib 24px, growth 57px) -->
  <rect x="495" y="256" width="70" height="24" fill="#C9C5BA"/>
  <rect x="495" y="199" width="70" height="57" rx="2" fill="#2D5016"/>
  <rect x="495" y="199" width="70" height="81" fill="url(#coinLines)"/>
  <text x="530" y="192" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016">$610,000</text>
  <text x="530" y="300" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">YEAR 30</text>
  <text x="530" y="315" text-anchor="middle" font-size="10" fill="#999999">$180,000 saved</text>

  <!-- YEAR 40: total 1,312,407 -> 175px (contrib 32px, growth 143px) -->
  <rect x="635" y="248" width="70" height="32" fill="#C9C5BA"/>
  <rect x="635" y="105" width="70" height="143" rx="2" fill="#2D5016"/>
  <rect x="635" y="105" width="70" height="175" fill="url(#coinLines)"/>
  <text x="670" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016">$1.31 million</text>
  <text x="670" y="300" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">YEAR 40</text>
  <text x="670" y="315" text-anchor="middle" font-size="10" fill="#999999">$240,000 saved</text>

  <text x="380" y="334" text-anchor="middle" font-size="9" fill="#999999">Assumes $500 monthly contributions and a 7% annual return, compounded monthly. Stacks drawn to scale.</text>
</svg>
