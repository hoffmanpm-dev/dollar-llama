<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, Helvetica, sans-serif; background: #FAF8F3;">
  <rect x="0" y="0" width="760" height="340" fill="#FAF8F3"/>

  <text x="380" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5016" letter-spacing="2.5" style="text-transform: uppercase;">THE IMPULSE GAP</text>
  <text x="380" y="44" text-anchor="middle" font-size="11" fill="#999999">Funds built around hot ideas, over a recent five-year stretch</text>

  <rect x="80" y="58" width="600" height="232" rx="8" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>

  <!-- Bar 1: fund return -->
  <text x="230" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D5016">7.3% a year</text>
  <rect x="170" y="100" width="120" height="140" fill="#2D5016" rx="2"/>
  <text x="230" y="258" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">WHAT THE FUNDS</text>
  <text x="230" y="272" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">RETURNED</text>

  <!-- Bar 2: investor return -->
  <text x="530" y="186" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">2.4% a year</text>
  <rect x="470" y="194" width="120" height="46" fill="#999999" rx="2"/>
  <text x="530" y="258" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">WHAT INVESTORS IN THEM</text>
  <text x="530" y="272" text-anchor="middle" font-size="10" fill="#999999" letter-spacing="1">ACTUALLY EARNED</text>

  <!-- Gap annotation -->
  <line x1="290" y1="100" x2="470" y2="100" stroke="#999999" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="290" y1="194" x2="380" y2="194" stroke="#999999" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="104" x2="380" y2="190" stroke="#333333" stroke-width="1.5"/>
  <path d="M 380 104 L 376 112 L 384 112 Z" fill="#333333"/>
  <path d="M 380 190 L 376 182 L 384 182 Z" fill="#333333"/>
  <text x="392" y="138" font-size="10" fill="#999999" letter-spacing="1">THE BEHAVIOR GAP</text>
  <text x="392" y="154" font-size="12" fill="#333333">About 5 points a year,</text>
  <text x="392" y="170" font-size="12" fill="#333333">lost to buying high and selling low</text>

  <!-- Baseline -->
  <line x1="120" y1="240" x2="640" y2="240" stroke="#E0DDD5" stroke-width="2"/>

  <text x="380" y="322" text-anchor="middle" font-size="10" fill="#999999">Average annual total return of thematic funds vs. the dollar-weighted return investors earned in them. Source: Morningstar.</text>
</svg>
