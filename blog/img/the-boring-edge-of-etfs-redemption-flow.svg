<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,Helvetica,sans-serif;background:#FAF8F3;">
  <text x="380" y="26" text-anchor="middle" fill="#2D5016" font-size="13" font-weight="bold" letter-spacing="2.5">HOW ETFs DODGE CAPITAL GAINS</text>

  <rect x="20" y="50" width="350" height="290" rx="8" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <path d="M 28 50 h 334 a 8 8 0 0 1 8 8 v 32 h -350 v -32 a 8 8 0 0 1 8 -8 z" fill="#2D5016"/>
  <text x="195" y="78" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">MUTUAL FUND</text>

  <text x="195" y="115" text-anchor="middle" fill="#999999" font-size="10" letter-spacing="1">WHEN AN INVESTOR SELLS</text>

  <rect x="40" y="135" width="135" height="50" rx="4" fill="#FAF8F3" stroke="#E0DDD5" stroke-width="1"/>
  <text x="107" y="158" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Fund's Stock</text>
  <text x="107" y="173" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Holdings</text>

  <line x1="180" y1="160" x2="218" y2="160" stroke="#999999" stroke-width="2"/>
  <polygon points="218,160 211,156 211,164" fill="#999999"/>
  <text x="199" y="150" text-anchor="middle" fill="#A4574B" font-size="10" font-weight="bold" letter-spacing="0.5">SELLS</text>

  <rect x="223" y="135" width="125" height="50" rx="4" fill="#FAF8F3" stroke="#E0DDD5" stroke-width="1"/>
  <text x="285" y="166" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Open Market</text>

  <rect x="120" y="215" width="150" height="34" rx="4" fill="#A4574B"/>
  <text x="195" y="237" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" letter-spacing="0.5">TAXABLE GAIN</text>

  <text x="195" y="275" text-anchor="middle" fill="#5B6568" font-size="11">Fund sells stock to raise cash.</text>
  <text x="195" y="293" text-anchor="middle" fill="#5B6568" font-size="11">The sale creates a capital gain.</text>
  <text x="195" y="311" text-anchor="middle" fill="#5B6568" font-size="11">Every shareholder gets the tax bill.</text>

  <rect x="390" y="50" width="350" height="290" rx="8" fill="#FFFFFF" stroke="#E0DDD5" stroke-width="1"/>
  <path d="M 398 50 h 334 a 8 8 0 0 1 8 8 v 32 h -350 v -32 a 8 8 0 0 1 8 -8 z" fill="#2D5016"/>
  <text x="565" y="78" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold">ETF</text>

  <text x="565" y="115" text-anchor="middle" fill="#999999" font-size="10" letter-spacing="1">WHEN AN INVESTOR SELLS</text>

  <rect x="410" y="135" width="135" height="50" rx="4" fill="#FAF8F3" stroke="#E0DDD5" stroke-width="1"/>
  <text x="477" y="158" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Fund's Stock</text>
  <text x="477" y="173" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Holdings</text>

  <line x1="550" y1="160" x2="588" y2="160" stroke="#999999" stroke-width="2"/>
  <polygon points="588,160 581,156 581,164" fill="#999999"/>
  <text x="569" y="150" text-anchor="middle" fill="#2D5016" font-size="10" font-weight="bold" letter-spacing="0.5">HANDS</text>

  <rect x="593" y="135" width="125" height="50" rx="4" fill="#FAF8F3" stroke="#E0DDD5" stroke-width="1"/>
  <text x="655" y="158" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Authorized</text>
  <text x="655" y="173" text-anchor="middle" fill="#333333" font-size="12" font-weight="bold">Participant</text>

  <rect x="490" y="215" width="150" height="34" rx="4" fill="#2D5016"/>
  <text x="565" y="237" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" letter-spacing="0.5">NO SALE, NO TAX</text>

  <text x="565" y="275" text-anchor="middle" fill="#5B6568" font-size="11">Fund hands stock directly to the AP.</text>
  <text x="565" y="293" text-anchor="middle" fill="#5B6568" font-size="11">Tax code treats this as a redemption,</text>
  <text x="565" y="311" text-anchor="middle" fill="#5B6568" font-size="11">not a sale. No capital gain to pass on.</text>
</svg>
